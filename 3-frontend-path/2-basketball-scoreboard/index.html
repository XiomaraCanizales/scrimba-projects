<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="box">
            <h2 class="box-title">HOME</h2>
            <div id="home-score" class="score">0</div>
            <div class="pts-container">
                <button onclick="add1ptnH()">+1</button>
                <button onclick="add2ptnH()">+2</button>
                <button onclick="add3ptnH()">+3</button>
            </div>
            </div>
            <div class="box">
                <h2 class="box-title">GUEST</h2>
                <div id="guest-score" class="score">0</div>
                <div class="pts-container">
                    <button onclick="add1ptnG()">+1</button>
                    <button onclick="add2ptnG()">+2</button>
                    <button onclick="add3ptnG()">+3</button>
                </div>
            </div>
        </div>
        <button id="new-game" onclick="reset()">New Game</button>
    </main>
    <script src="index.js"></script>
</body>
</html>
